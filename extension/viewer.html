<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tabduct — Screenshot</title>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; font: 13px system-ui, sans-serif; background: #1e1e1e; color: #eee; }
      .bar { position: sticky; top: 0; display: flex; gap: 12px; align-items: center; padding: 10px 14px; background: #111; border-bottom: 1px solid #333; }
      .bar .meta { color: #aaa; font-size: 12px; }
      .bar .meta.warn { color: #f5a623; }
      .bar a.btn { margin-left: auto; background: #2ecc71; color: #063; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-weight: 600; }
      .wrap { padding: 16px; text-align: center; }
      img { max-width: 100%; height: auto; box-shadow: 0 2px 12px rgba(0, 0, 0, .5); background: #fff; }
    </style>
  </head>
  <body>
    <div class="bar">
      <strong>Tabduct screenshot</strong>
      <span id="meta" class="meta"></span>
      <a id="dl" class="btn" download hidden>Download</a>
    </div>
    <div class="wrap"><img id="img" alt="screenshot" hidden /></div>
    <script src="viewer.js"></script>
  </body>
</html>
